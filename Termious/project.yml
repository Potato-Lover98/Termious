name: Termious
options:
  bundleIdPrefix: com.termious
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  Termious:
    type: application
    platform: iOS
    sources:
      - path: Termious
    resources:
      - path: Termious/Resources/Assets.xcassets
    info:
      path: Termious/Support/Info.plist
      properties:
        CFBundleDisplayName: Termious
        UILaunchScreen:
          UIColorName: ""
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSDocumentsFolderUsageDescription: "Termious needs access to the Files app so you can run shell commands on your own files and folders."
        CFBundleDocumentTypes:
          - CFBundleTypeName: All files
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.data
              - public.content
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termious.app
        CODE_SIGN_ENTITLEMENTS: Termious/Support/Termious.entitlements
        INFOPLIST_FILE: Termious/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon